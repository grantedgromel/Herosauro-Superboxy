name: Deploy web build to GitHub Pages

# Keeps the live Pages site in sync with the committed Godot web export.
# The build lives at herosauro-superboxy/web/ (regenerated whenever the game
# changes); this publishes it to the gh-pages branch that Pages serves.

on:
  push:
    branches: [main]
    paths:
      - 'herosauro-superboxy/web/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish web build to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./herosauro-superboxy/web
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy web build from ${{ github.sha }}"
