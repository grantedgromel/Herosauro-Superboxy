<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Veblen — For the Rational Consumer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "type": "modern",
  "palette": "paper",
  "columns": 4,
  "voice": "neutral"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState("browse");
  const [activeItem, setActiveItem] = useState(null);
  const [savedSet, setSavedSet] = useState(() => new Set(window.VEBLEN_DATA.savedIds));

  const onOpen = (item) => {
    setActiveItem(item);
    setPage("product");
    window.scrollTo({top: 0, behavior: "instant"});
  };
  const onNav = (p) => {
    setPage(p);
    window.scrollTo({top: 0, behavior: "instant"});
  };
  const onToggleSave = (id) => {
    const next = new Set(savedSet);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSavedSet(next);
  };

  const cls = `type-${tweaks.type} palette-${tweaks.palette} cols-${tweaks.columns}`;

  return (
    <div className={cls} style={{minHeight: "100vh"}}>
      <Masthead
        page={page === "product" ? "browse" : page}
        onNav={onNav}
        columns={tweaks.columns}
        onColumns={(n) => setTweak("columns", n)}
      />

      {page === "browse" && (
        <div data-screen-label="01 Browse">
          <BrowseScreen onOpen={onOpen} savedSet={savedSet} onToggleSave={onToggleSave} voice={tweaks.voice} />
        </div>
      )}
      {page === "product" && activeItem && (
        <div data-screen-label="02 Product Detail">
          <ProductScreen item={activeItem} onBack={() => setPage("browse")} onOpen={onOpen} voice={tweaks.voice} savedSet={savedSet} onToggleSave={onToggleSave} />
        </div>
      )}
      {page === "method" && (
        <div data-screen-label="03 Methodology"><MethodologyScreen /></div>
      )}
      {page === "saved" && (
        <div data-screen-label="04 Saved & Alerts">
          <SavedScreen savedSet={savedSet} onToggleSave={onToggleSave} onOpen={onOpen} />
        </div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Typography">
          <TweakRadio label="Type pairing" value={tweaks.type} onChange={v => setTweak("type", v)}
            options={[
              { value: "modern", label: "Modern" },
              { value: "classical", label: "Classical" },
              { value: "stark", label: "Stark" },
            ]} />
        </TweakSection>
        <TweakSection title="Palette">
          <TweakRadio label="Background" value={tweaks.palette} onChange={v => setTweak("palette", v)}
            options={[
              { value: "paper", label: "Cream" },
              { value: "stark", label: "White" },
              { value: "dark", label: "Ink" },
            ]} />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakRadio label="Columns" value={tweaks.columns} onChange={v => setTweak("columns", v)}
            options={[
              { value: 2, label: "2" },
              { value: 4, label: "4" },
              { value: 6, label: "6" },
            ]} />
        </TweakSection>
        <TweakSection title="Editorial voice">
          <TweakRadio label="Tone" value={tweaks.voice} onChange={v => setTweak("voice", v)}
            options={[
              { value: "neutral", label: "Neutral" },
              { value: "mild", label: "Opinionated" },
              { value: "strong", label: "Polemical" },
            ]} />
        </TweakSection>
        <TweakSection title="Jump to screen">
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap: 6}}>
            <TweakButton onClick={() => onNav("browse")}>Browse</TweakButton>
            <TweakButton onClick={() => onNav("saved")}>Saved</TweakButton>
            <TweakButton onClick={() => onNav("method")}>Method</TweakButton>
            <TweakButton onClick={() => onOpen(window.VEBLEN_DATA.items[4])}>Product (Excellent)</TweakButton>
            <TweakButton onClick={() => onOpen(window.VEBLEN_DATA.items[7])}>Product (Poor)</TweakButton>
          </div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
