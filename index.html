<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herosauro & Super Boxy: Legends of Porto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Comic Sans MS', 'Chalkboard', cursive;
            background: #87CEEB;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        /* UI Overlay */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Health Bars Container */
        .health-container {
            position: absolute;
            padding: 15px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            border: 4px solid #333;
            box-shadow: 4px 4px 0px #333;
        }

        #player1-health-container {
            top: 20px;
            left: 20px;
        }

        #player2-health-container {
            top: 20px;
            right: 20px;
        }

        #boss-health-container {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 300px;
        }

        .health-label {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            text-shadow: 1px 1px 0px #fff;
        }

        .health-bar-bg {
            width: 150px;
            height: 25px;
            background: #444;
            border-radius: 12px;
            border: 3px solid #222;
            overflow: hidden;
        }

        #boss-health-container .health-bar-bg {
            width: 280px;
        }

        .health-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        #player1-health {
            background: linear-gradient(180deg, #7CFC00, #228B22);
            width: 100%;
        }

        #player2-health {
            background: linear-gradient(180deg, #FF6B6B, #DC143C);
            width: 100%;
        }

        #boss-health {
            background: linear-gradient(180deg, #8B4513, #4A2511);
            width: 100%;
        }

        /* Title */
        #game-title {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #333;
            text-shadow: 2px 2px 0px #fff, -1px -1px 0px #fff;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 25px;
            border-radius: 15px;
            border: 3px solid #333;
        }

        /* Controls Help */
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #333;
            background: rgba(255, 255, 255, 0.85);
            padding: 12px;
            border-radius: 10px;
            border: 3px solid #333;
            line-height: 1.6;
        }

        #controls-help strong {
            color: #228B22;
        }

        #controls-help .p2 {
            color: #DC143C;
        }

        /* Ability Cooldowns */
        .ability-indicator {
            position: absolute;
            bottom: 20px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            border: 3px solid #333;
            font-size: 14px;
            font-weight: bold;
        }

        #p1-ability {
            right: 200px;
            color: #228B22;
        }

        #p2-ability {
            right: 20px;
            color: #DC143C;
        }

        .ready {
            background: rgba(144, 238, 144, 0.9) !important;
        }

        /* Victory/Defeat Screen */
        #game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #333;
            text-shadow: 3px 3px 0px #fff;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 60px;
            border-radius: 20px;
            border: 5px solid #333;
            display: none;
            text-align: center;
        }

        #game-message.victory {
            color: #228B22;
            display: block;
        }

        #game-message.defeat {
            color: #DC143C;
            display: block;
        }

        #restart-btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 20px;
            font-family: inherit;
            background: #4CAF50;
            color: white;
            border: 3px solid #333;
            border-radius: 10px;
            cursor: pointer;
            pointer-events: auto;
        }

        #restart-btn:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui-overlay">
            <!-- Player 1 Health -->
            <div id="player1-health-container" class="health-container">
                <div class="health-label">🦖 HEROSAURO (Rui)</div>
                <div class="health-bar-bg">
                    <div id="player1-health" class="health-bar"></div>
                </div>
            </div>

            <!-- Boss Health -->
            <div id="boss-health-container" class="health-container">
                <div class="health-label">👹 ADAMASTOR - The Giant</div>
                <div class="health-bar-bg">
                    <div id="boss-health" class="health-bar"></div>
                </div>
            </div>

            <!-- Player 2 Health -->
            <div id="player2-health-container" class="health-container">
                <div class="health-label">🥊 SUPER BOXY (Kiko)</div>
                <div class="health-bar-bg">
                    <div id="player2-health" class="health-bar"></div>
                </div>
            </div>

            <!-- Controls Help -->
            <div id="controls-help">
                <strong>HEROSAURO:</strong> WASD + E (Dino Energy)<br>
                <span class="p2"><strong>SUPER BOXY:</strong> Arrows + Space (Boxy Dash)</span>
            </div>

            <!-- Ability Indicators -->
            <div id="p1-ability" class="ability-indicator ready">🦖 DINO: Ready!</div>
            <div id="p2-ability" class="ability-indicator ready">🥊 DASH: Ready!</div>

            <!-- Game Title -->
            <div id="game-title">⚔️ Legends of Porto ⚔️</div>

            <!-- Victory/Defeat Message -->
            <div id="game-message">
                <span id="message-text"></span>
                <br>
                <button id="restart-btn" onclick="restartGame()">Play Again!</button>
            </div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Cannon.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

    <script>
        // ============================================
        // HEROSAURO & SUPER BOXY: LEGENDS OF PORTO
        // A 3D Co-op Action Game MVP
        // ============================================

        // Game Configuration
        const CONFIG = {
            BRIDGE_LENGTH: 100,
            BRIDGE_WIDTH: 12,
            BRIDGE_HEIGHT: 2,
            RIVER_SIZE: 200,
            PLAYER_SIZE: 1.5,
            PLAYER_SPEED: 8,
            JUMP_FORCE: 12,
            BOSS_SIZE: 6,
            BOSS_HEALTH: 500,
            PLAYER_HEALTH: 100,
            DINO_ENERGY_DAMAGE: 50,
            BOXY_DASH_DAMAGE: 25,
            BOSS_SLAM_DAMAGE: 20,
            RESPAWN_HEIGHT: -10,
            DINO_COOLDOWN: 2000,
            DASH_COOLDOWN: 1500,
            DASH_FORCE: 40
        };

        // Game State
        let gameState = {
            player1Health: CONFIG.PLAYER_HEALTH,
            player2Health: CONFIG.PLAYER_HEALTH,
            bossHealth: CONFIG.BOSS_HEALTH,
            gameOver: false,
            victory: false,
            p1AbilityReady: true,
            p2AbilityReady: true,
            p1LastAbility: 0,
            p2LastAbility: 0
        };

        // Three.js Setup
        let scene, camera, renderer;
        let player1Mesh, player2Mesh, bossMesh;
        let bridge, river, bridgeArches;
        let dinoEnergyMesh = null;

        // Cannon.js Setup
        let world;
        let player1Body, player2Body, bossBody, bridgeBody;

        // Input State
        const keys = {};

        // Boss AI State
        let bossDirection = 1;
        let bossSlameTimer = 0;
        let bossIsSlapping = false;

        // Animation
        let clock;

        // Initialize the game
        function init() {
            clock = new THREE.Clock();

            initThreeJS();
            initCannonJS();
            createEnvironment();
            createPlayers();
            createBoss();
            setupEventListeners();

            animate();
        }

        // Three.js Initialization
        function initThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Sky blue

            // Camera
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 20, 40);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lighting - Bright cartoon style
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(50, 100, 50);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 500;
            directionalLight.shadow.camera.left = -100;
            directionalLight.shadow.camera.right = 100;
            directionalLight.shadow.camera.top = 100;
            directionalLight.shadow.camera.bottom = -100;
            scene.add(directionalLight);

            // Hemisphere light for cel-shaded look
            const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x8B4513, 0.4);
            scene.add(hemiLight);

            // Add some clouds
            createClouds();
        }

        // Cannon.js Initialization
        function initCannonJS() {
            world = new CANNON.World();
            world.gravity.set(0, -30, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 10;

            // Ground material
            const groundMaterial = new CANNON.Material('ground');
            const playerMaterial = new CANNON.Material('player');

            const groundPlayerContact = new CANNON.ContactMaterial(groundMaterial, playerMaterial, {
                friction: 0.4,
                restitution: 0.1
            });
            world.addContactMaterial(groundPlayerContact);
        }

        // Create clouds for atmosphere
        function createClouds() {
            const cloudGeometry = new THREE.SphereGeometry(5, 8, 8);
            const cloudMaterial = new THREE.MeshToonMaterial({ color: 0xffffff });

            for (let i = 0; i < 15; i++) {
                const cloud = new THREE.Group();

                for (let j = 0; j < 4; j++) {
                    const puff = new THREE.Mesh(cloudGeometry, cloudMaterial);
                    puff.position.set(
                        Math.random() * 8 - 4,
                        Math.random() * 2,
                        Math.random() * 8 - 4
                    );
                    puff.scale.setScalar(0.5 + Math.random() * 0.5);
                    cloud.add(puff);
                }

                cloud.position.set(
                    Math.random() * 200 - 100,
                    30 + Math.random() * 20,
                    Math.random() * 200 - 100
                );
                scene.add(cloud);
            }
        }

        // Create the environment (Bridge and River)
        function createEnvironment() {
            // === DOURO RIVER ===
            const riverGeometry = new THREE.PlaneGeometry(CONFIG.RIVER_SIZE, CONFIG.RIVER_SIZE);
            const riverMaterial = new THREE.MeshToonMaterial({
                color: 0x1E90FF,
                side: THREE.DoubleSide
            });
            river = new THREE.Mesh(riverGeometry, riverMaterial);
            river.rotation.x = -Math.PI / 2;
            river.position.y = -15;
            scene.add(river);

            // Water ripples effect (simple animated circles)
            const rippleGeometry = new THREE.RingGeometry(0.5, 1, 16);
            const rippleMaterial = new THREE.MeshBasicMaterial({
                color: 0x4169E1,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.3
            });

            for (let i = 0; i < 20; i++) {
                const ripple = new THREE.Mesh(rippleGeometry, rippleMaterial.clone());
                ripple.rotation.x = -Math.PI / 2;
                ripple.position.set(
                    Math.random() * 100 - 50,
                    -14.9,
                    Math.random() * 100 - 50
                );
                ripple.scale.setScalar(1 + Math.random() * 3);
                ripple.userData.ripplePhase = Math.random() * Math.PI * 2;
                scene.add(ripple);
            }

            // === DOM LUÍS BRIDGE ===
            // Main bridge deck
            const bridgeGeometry = new THREE.BoxGeometry(
                CONFIG.BRIDGE_LENGTH,
                CONFIG.BRIDGE_HEIGHT,
                CONFIG.BRIDGE_WIDTH
            );
            const bridgeMaterial = new THREE.MeshToonMaterial({
                color: 0x708090 // Metallic grey
            });
            bridge = new THREE.Mesh(bridgeGeometry, bridgeMaterial);
            bridge.position.y = CONFIG.BRIDGE_HEIGHT / 2;
            bridge.receiveShadow = true;
            bridge.castShadow = true;
            scene.add(bridge);

            // Bridge physics body
            const bridgeShape = new CANNON.Box(new CANNON.Vec3(
                CONFIG.BRIDGE_LENGTH / 2,
                CONFIG.BRIDGE_HEIGHT / 2,
                CONFIG.BRIDGE_WIDTH / 2
            ));
            bridgeBody = new CANNON.Body({ mass: 0 });
            bridgeBody.addShape(bridgeShape);
            bridgeBody.position.set(0, CONFIG.BRIDGE_HEIGHT / 2, 0);
            world.addBody(bridgeBody);

            // Bridge railings
            const railingGeometry = new THREE.BoxGeometry(CONFIG.BRIDGE_LENGTH, 2, 0.3);
            const railingMaterial = new THREE.MeshToonMaterial({ color: 0x4A4A4A });

            const railingLeft = new THREE.Mesh(railingGeometry, railingMaterial);
            railingLeft.position.set(0, CONFIG.BRIDGE_HEIGHT + 1, -CONFIG.BRIDGE_WIDTH / 2 + 0.15);
            scene.add(railingLeft);

            const railingRight = new THREE.Mesh(railingGeometry, railingMaterial);
            railingRight.position.set(0, CONFIG.BRIDGE_HEIGHT + 1, CONFIG.BRIDGE_WIDTH / 2 - 0.15);
            scene.add(railingRight);

            // Bridge arch supports
            createBridgeArches();

            // Bridge decorative elements (vertical posts)
            const postGeometry = new THREE.BoxGeometry(0.5, 3, 0.5);
            const postMaterial = new THREE.MeshToonMaterial({ color: 0x5A5A5A });

            for (let x = -CONFIG.BRIDGE_LENGTH / 2 + 5; x <= CONFIG.BRIDGE_LENGTH / 2 - 5; x += 10) {
                const postLeft = new THREE.Mesh(postGeometry, postMaterial);
                postLeft.position.set(x, CONFIG.BRIDGE_HEIGHT + 1.5, -CONFIG.BRIDGE_WIDTH / 2 + 0.3);
                scene.add(postLeft);

                const postRight = new THREE.Mesh(postGeometry, postMaterial);
                postRight.position.set(x, CONFIG.BRIDGE_HEIGHT + 1.5, CONFIG.BRIDGE_WIDTH / 2 - 0.3);
                scene.add(postRight);
            }

            // Porto city silhouette (background)
            createCitySilhouette();
        }

        // Create the iconic arches of Dom Luís Bridge
        function createBridgeArches() {
            bridgeArches = new THREE.Group();

            const archMaterial = new THREE.MeshToonMaterial({ color: 0x606060 });

            // Main arch
            const archCurve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(-40, -10, 0),
                new THREE.Vector3(-20, 8, 0),
                new THREE.Vector3(0, 12, 0),
                new THREE.Vector3(20, 8, 0),
                new THREE.Vector3(40, -10, 0)
            ]);

            const archGeometry = new THREE.TubeGeometry(archCurve, 50, 0.8, 8, false);

            // Front arch
            const archFront = new THREE.Mesh(archGeometry, archMaterial);
            archFront.position.z = -CONFIG.BRIDGE_WIDTH / 2 - 2;
            bridgeArches.add(archFront);

            // Back arch
            const archBack = new THREE.Mesh(archGeometry, archMaterial);
            archBack.position.z = CONFIG.BRIDGE_WIDTH / 2 + 2;
            bridgeArches.add(archBack);

            // Vertical supports
            const supportGeometry = new THREE.BoxGeometry(0.6, 15, 0.6);
            for (let x = -35; x <= 35; x += 10) {
                const heightAtX = 12 - Math.pow(x / 40, 2) * 22;
                if (heightAtX > 0) {
                    const supportFront = new THREE.Mesh(supportGeometry, archMaterial);
                    supportFront.position.set(x, heightAtX / 2 - 5, -CONFIG.BRIDGE_WIDTH / 2 - 2);
                    supportFront.scale.y = (heightAtX + 10) / 15;
                    bridgeArches.add(supportFront);

                    const supportBack = new THREE.Mesh(supportGeometry, archMaterial);
                    supportBack.position.set(x, heightAtX / 2 - 5, CONFIG.BRIDGE_WIDTH / 2 + 2);
                    supportBack.scale.y = (heightAtX + 10) / 15;
                    bridgeArches.add(supportBack);
                }
            }

            // Cross beams
            const beamGeometry = new THREE.BoxGeometry(0.4, 0.4, CONFIG.BRIDGE_WIDTH + 6);
            for (let x = -35; x <= 35; x += 5) {
                const heightAtX = 12 - Math.pow(x / 40, 2) * 22;
                if (heightAtX > -5) {
                    const beam = new THREE.Mesh(beamGeometry, archMaterial);
                    beam.position.set(x, Math.max(heightAtX, -5), 0);
                    bridgeArches.add(beam);
                }
            }

            scene.add(bridgeArches);
        }

        // Create Porto city silhouette
        function createCitySilhouette() {
            const buildingMaterial = new THREE.MeshToonMaterial({ color: 0xDEB887 });
            const roofMaterial = new THREE.MeshToonMaterial({ color: 0xCD853F });

            // Left bank buildings
            for (let i = 0; i < 15; i++) {
                const width = 5 + Math.random() * 8;
                const height = 8 + Math.random() * 15;
                const depth = 5 + Math.random() * 5;

                const buildingGeometry = new THREE.BoxGeometry(width, height, depth);
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                building.position.set(
                    -60 - i * 6,
                    height / 2 - 10,
                    (Math.random() - 0.5) * 30
                );
                scene.add(building);

                // Roof
                const roofGeometry = new THREE.ConeGeometry(width / 1.5, 4, 4);
                const roof = new THREE.Mesh(roofGeometry, roofMaterial);
                roof.position.set(building.position.x, building.position.y + height / 2 + 2, building.position.z);
                roof.rotation.y = Math.PI / 4;
                scene.add(roof);
            }

            // Right bank buildings
            for (let i = 0; i < 15; i++) {
                const width = 5 + Math.random() * 8;
                const height = 8 + Math.random() * 15;
                const depth = 5 + Math.random() * 5;

                const buildingGeometry = new THREE.BoxGeometry(width, height, depth);
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                building.position.set(
                    60 + i * 6,
                    height / 2 - 10,
                    (Math.random() - 0.5) * 30
                );
                scene.add(building);

                // Roof
                const roofGeometry = new THREE.ConeGeometry(width / 1.5, 4, 4);
                const roof = new THREE.Mesh(roofGeometry, roofMaterial);
                roof.position.set(building.position.x, building.position.y + height / 2 + 2, building.position.z);
                roof.rotation.y = Math.PI / 4;
                scene.add(roof);
            }
        }

        // Create the players
        function createPlayers() {
            // === PLAYER 1: HEROSAURO (Rui) ===
            const p1Group = new THREE.Group();

            // Main body (green cube - overalls)
            const p1BodyGeometry = new THREE.BoxGeometry(CONFIG.PLAYER_SIZE, CONFIG.PLAYER_SIZE * 1.2, CONFIG.PLAYER_SIZE);
            const p1BodyMaterial = new THREE.MeshToonMaterial({ color: 0x228B22 }); // Forest green
            const p1Body = new THREE.Mesh(p1BodyGeometry, p1BodyMaterial);
            p1Body.castShadow = true;
            p1Group.add(p1Body);

            // Head
            const headGeometry = new THREE.BoxGeometry(CONFIG.PLAYER_SIZE * 0.8, CONFIG.PLAYER_SIZE * 0.6, CONFIG.PLAYER_SIZE * 0.8);
            const headMaterial = new THREE.MeshToonMaterial({ color: 0xFFDBB4 }); // Skin tone
            const head = new THREE.Mesh(headGeometry, headMaterial);
            head.position.y = CONFIG.PLAYER_SIZE * 0.9;
            p1Group.add(head);

            // Red mask
            const maskGeometry = new THREE.BoxGeometry(CONFIG.PLAYER_SIZE * 0.85, CONFIG.PLAYER_SIZE * 0.2, CONFIG.PLAYER_SIZE * 0.3);
            const maskMaterial = new THREE.MeshToonMaterial({ color: 0xDC143C });
            const mask = new THREE.Mesh(maskGeometry, maskMaterial);
            mask.position.set(0, CONFIG.PLAYER_SIZE * 0.95, CONFIG.PLAYER_SIZE * 0.3);
            p1Group.add(mask);

            // Cape
            const capeGeometry = new THREE.BoxGeometry(CONFIG.PLAYER_SIZE * 0.8, CONFIG.PLAYER_SIZE * 1.5, 0.1);
            const capeMaterial = new THREE.MeshToonMaterial({ color: 0xDC143C, side: THREE.DoubleSide });
            const cape = new THREE.Mesh(capeGeometry, capeMaterial);
            cape.position.set(0, CONFIG.PLAYER_SIZE * 0.2, -CONFIG.PLAYER_SIZE * 0.6);
            p1Group.add(cape);

            // Dino emblem on chest
            const emblemGeometry = new THREE.CircleGeometry(0.3, 16);
            const emblemMaterial = new THREE.MeshToonMaterial({ color: 0xFFD700 });
            const emblem = new THREE.Mesh(emblemGeometry, emblemMaterial);
            emblem.position.set(0, CONFIG.PLAYER_SIZE * 0.3, CONFIG.PLAYER_SIZE * 0.51);
            p1Group.add(emblem);

            player1Mesh = p1Group;
            player1Mesh.position.set(-30, 5, 0);
            scene.add(player1Mesh);

            // Player 1 physics body
            const p1Shape = new CANNON.Box(new CANNON.Vec3(
                CONFIG.PLAYER_SIZE / 2,
                CONFIG.PLAYER_SIZE * 0.75,
                CONFIG.PLAYER_SIZE / 2
            ));
            player1Body = new CANNON.Body({
                mass: 5,
                linearDamping: 0.5,
                angularDamping: 0.99
            });
            player1Body.addShape(p1Shape);
            player1Body.position.set(-30, 5, 0);
            world.addBody(player1Body);

            // === PLAYER 2: SUPER BOXY (Kiko) ===
            const p2Group = new THREE.Group();

            // Main body (smaller green cube)
            const p2BodyGeometry = new THREE.BoxGeometry(CONFIG.PLAYER_SIZE * 0.85, CONFIG.PLAYER_SIZE, CONFIG.PLAYER_SIZE * 0.85);
            const p2BodyMaterial = new THREE.MeshToonMaterial({ color: 0x32CD32 }); // Lime green
            const p2BodyMesh = new THREE.Mesh(p2BodyGeometry, p2BodyMaterial);
            p2BodyMesh.castShadow = true;
            p2Group.add(p2BodyMesh);

            // "SUPER BOXY" label on chest (represented as white patch)
            const labelGeometry = new THREE.BoxGeometry(0.6, 0.3, 0.05);
            const labelMaterial = new THREE.MeshToonMaterial({ color: 0xFFFFFF });
            const label = new THREE.Mesh(labelGeometry, labelMaterial);
            label.position.set(0, CONFIG.PLAYER_SIZE * 0.2, CONFIG.PLAYER_SIZE * 0.44);
            p2Group.add(label);

            // Red circle on label
            const circleGeometry = new THREE.CircleGeometry(0.15, 16);
            const circleMaterial = new THREE.MeshToonMaterial({ color: 0xDC143C });
            const circle = new THREE.Mesh(circleGeometry, circleMaterial);
            circle.position.set(0, CONFIG.PLAYER_SIZE * 0.2, CONFIG.PLAYER_SIZE * 0.46);
            p2Group.add(circle);

            // Head
            const p2HeadGeometry = new THREE.BoxGeometry(CONFIG.PLAYER_SIZE * 0.7, CONFIG.PLAYER_SIZE * 0.5, CONFIG.PLAYER_SIZE * 0.7);
            const p2Head = new THREE.Mesh(p2HeadGeometry, headMaterial);
            p2Head.position.y = CONFIG.PLAYER_SIZE * 0.75;
            p2Group.add(p2Head);

            // Red mask
            const p2Mask = new THREE.Mesh(
                new THREE.BoxGeometry(CONFIG.PLAYER_SIZE * 0.75, CONFIG.PLAYER_SIZE * 0.18, CONFIG.PLAYER_SIZE * 0.25),
                maskMaterial
            );
            p2Mask.position.set(0, CONFIG.PLAYER_SIZE * 0.8, CONFIG.PLAYER_SIZE * 0.25);
            p2Group.add(p2Mask);

            // Red Boxing Gloves (two red spheres on sides)
            const gloveGeometry = new THREE.SphereGeometry(0.4, 16, 16);
            const gloveMaterial = new THREE.MeshToonMaterial({ color: 0xDC143C });

            const leftGlove = new THREE.Mesh(gloveGeometry, gloveMaterial);
            leftGlove.position.set(-CONFIG.PLAYER_SIZE * 0.65, CONFIG.PLAYER_SIZE * 0.2, 0);
            leftGlove.castShadow = true;
            p2Group.add(leftGlove);
            p2Group.userData.leftGlove = leftGlove;

            const rightGlove = new THREE.Mesh(gloveGeometry, gloveMaterial);
            rightGlove.position.set(CONFIG.PLAYER_SIZE * 0.65, CONFIG.PLAYER_SIZE * 0.2, 0);
            rightGlove.castShadow = true;
            p2Group.add(rightGlove);
            p2Group.userData.rightGlove = rightGlove;

            // Cape
            const p2Cape = new THREE.Mesh(
                new THREE.BoxGeometry(CONFIG.PLAYER_SIZE * 0.7, CONFIG.PLAYER_SIZE * 1.2, 0.1),
                capeMaterial
            );
            p2Cape.position.set(0, CONFIG.PLAYER_SIZE * 0.1, -CONFIG.PLAYER_SIZE * 0.5);
            p2Group.add(p2Cape);

            player2Mesh = p2Group;
            player2Mesh.position.set(-25, 5, 2);
            scene.add(player2Mesh);

            // Player 2 physics body
            const p2Shape = new CANNON.Box(new CANNON.Vec3(
                CONFIG.PLAYER_SIZE * 0.4,
                CONFIG.PLAYER_SIZE * 0.5,
                CONFIG.PLAYER_SIZE * 0.4
            ));
            player2Body = new CANNON.Body({
                mass: 4,
                linearDamping: 0.5,
                angularDamping: 0.99
            });
            player2Body.addShape(p2Shape);
            player2Body.position.set(-25, 5, 2);
            world.addBody(player2Body);
        }

        // Create the Boss (Adamastor)
        function createBoss() {
            const bossGroup = new THREE.Group();

            // Rocky grey material
            const rockMaterial = new THREE.MeshToonMaterial({ color: 0x696969 });
            const darkRockMaterial = new THREE.MeshToonMaterial({ color: 0x4A4A4A });

            // Main body (torso)
            const torsoGeometry = new THREE.BoxGeometry(CONFIG.BOSS_SIZE, CONFIG.BOSS_SIZE * 1.5, CONFIG.BOSS_SIZE * 0.8);
            const torso = new THREE.Mesh(torsoGeometry, rockMaterial);
            torso.castShadow = true;
            bossGroup.add(torso);

            // Head
            const headGeometry = new THREE.BoxGeometry(CONFIG.BOSS_SIZE * 0.7, CONFIG.BOSS_SIZE * 0.6, CONFIG.BOSS_SIZE * 0.6);
            const head = new THREE.Mesh(headGeometry, rockMaterial);
            head.position.y = CONFIG.BOSS_SIZE * 1.05;
            head.castShadow = true;
            bossGroup.add(head);
            bossGroup.userData.head = head;

            // Angry eyes
            const eyeGeometry = new THREE.SphereGeometry(0.4, 8, 8);
            const eyeMaterial = new THREE.MeshToonMaterial({ color: 0xFF4500 }); // Orange-red

            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEye.position.set(-CONFIG.BOSS_SIZE * 0.2, CONFIG.BOSS_SIZE * 1.1, CONFIG.BOSS_SIZE * 0.35);
            bossGroup.add(leftEye);

            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEye.position.set(CONFIG.BOSS_SIZE * 0.2, CONFIG.BOSS_SIZE * 1.1, CONFIG.BOSS_SIZE * 0.35);
            bossGroup.add(rightEye);

            // Eyebrows (angry)
            const browGeometry = new THREE.BoxGeometry(0.8, 0.2, 0.2);
            const browMaterial = new THREE.MeshToonMaterial({ color: 0x333333 });

            const leftBrow = new THREE.Mesh(browGeometry, browMaterial);
            leftBrow.position.set(-CONFIG.BOSS_SIZE * 0.2, CONFIG.BOSS_SIZE * 1.3, CONFIG.BOSS_SIZE * 0.35);
            leftBrow.rotation.z = 0.3;
            bossGroup.add(leftBrow);

            const rightBrow = new THREE.Mesh(browGeometry, browMaterial);
            rightBrow.position.set(CONFIG.BOSS_SIZE * 0.2, CONFIG.BOSS_SIZE * 1.3, CONFIG.BOSS_SIZE * 0.35);
            rightBrow.rotation.z = -0.3;
            bossGroup.add(rightBrow);

            // Arms
            const armGeometry = new THREE.BoxGeometry(CONFIG.BOSS_SIZE * 0.4, CONFIG.BOSS_SIZE * 1.2, CONFIG.BOSS_SIZE * 0.4);

            const leftArm = new THREE.Mesh(armGeometry, darkRockMaterial);
            leftArm.position.set(-CONFIG.BOSS_SIZE * 0.7, CONFIG.BOSS_SIZE * 0.2, 0);
            leftArm.castShadow = true;
            bossGroup.add(leftArm);
            bossGroup.userData.leftArm = leftArm;

            const rightArm = new THREE.Mesh(armGeometry, darkRockMaterial);
            rightArm.position.set(CONFIG.BOSS_SIZE * 0.7, CONFIG.BOSS_SIZE * 0.2, 0);
            rightArm.castShadow = true;
            bossGroup.add(rightArm);
            bossGroup.userData.rightArm = rightArm;

            // Hands (fists)
            const fistGeometry = new THREE.BoxGeometry(CONFIG.BOSS_SIZE * 0.5, CONFIG.BOSS_SIZE * 0.5, CONFIG.BOSS_SIZE * 0.5);

            const leftFist = new THREE.Mesh(fistGeometry, rockMaterial);
            leftFist.position.set(-CONFIG.BOSS_SIZE * 0.7, -CONFIG.BOSS_SIZE * 0.4, 0);
            bossGroup.add(leftFist);
            bossGroup.userData.leftFist = leftFist;

            const rightFist = new THREE.Mesh(fistGeometry, rockMaterial);
            rightFist.position.set(CONFIG.BOSS_SIZE * 0.7, -CONFIG.BOSS_SIZE * 0.4, 0);
            bossGroup.add(rightFist);
            bossGroup.userData.rightFist = rightFist;

            // Legs
            const legGeometry = new THREE.BoxGeometry(CONFIG.BOSS_SIZE * 0.4, CONFIG.BOSS_SIZE * 0.8, CONFIG.BOSS_SIZE * 0.4);

            const leftLeg = new THREE.Mesh(legGeometry, darkRockMaterial);
            leftLeg.position.set(-CONFIG.BOSS_SIZE * 0.25, -CONFIG.BOSS_SIZE * 1.1, 0);
            bossGroup.add(leftLeg);

            const rightLeg = new THREE.Mesh(legGeometry, darkRockMaterial);
            rightLeg.position.set(CONFIG.BOSS_SIZE * 0.25, -CONFIG.BOSS_SIZE * 1.1, 0);
            bossGroup.add(rightLeg);

            // Rock details on body
            const detailGeometry = new THREE.BoxGeometry(1, 1, 0.5);
            for (let i = 0; i < 8; i++) {
                const detail = new THREE.Mesh(detailGeometry, darkRockMaterial);
                detail.position.set(
                    (Math.random() - 0.5) * CONFIG.BOSS_SIZE * 0.8,
                    (Math.random() - 0.5) * CONFIG.BOSS_SIZE,
                    CONFIG.BOSS_SIZE * 0.45
                );
                detail.scale.setScalar(0.5 + Math.random() * 0.5);
                bossGroup.add(detail);
            }

            bossMesh = bossGroup;
            bossMesh.position.set(35, CONFIG.BOSS_SIZE * 1.5 + CONFIG.BRIDGE_HEIGHT, 0);
            scene.add(bossMesh);

            // Boss physics body
            const bossShape = new CANNON.Box(new CANNON.Vec3(
                CONFIG.BOSS_SIZE / 2,
                CONFIG.BOSS_SIZE,
                CONFIG.BOSS_SIZE * 0.4
            ));
            bossBody = new CANNON.Body({
                mass: 0, // Static for now, will be dynamic when defeated
                linearDamping: 0.9
            });
            bossBody.addShape(bossShape);
            bossBody.position.set(35, CONFIG.BOSS_SIZE * 1.5 + CONFIG.BRIDGE_HEIGHT, 0);
            world.addBody(bossBody);
        }

        // Event Listeners
        function setupEventListeners() {
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                keys[e.code] = true;
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
                keys[e.code] = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // Player Movement
        function handlePlayerMovement(delta) {
            if (gameState.gameOver) return;

            const moveSpeed = CONFIG.PLAYER_SPEED;

            // === Player 1 (WASD) ===
            const p1Vel = player1Body.velocity;

            if (keys['w']) p1Vel.z = -moveSpeed;
            else if (keys['s']) p1Vel.z = moveSpeed;
            else p1Vel.z *= 0.9;

            if (keys['a']) p1Vel.x = -moveSpeed;
            else if (keys['d']) p1Vel.x = moveSpeed;
            else p1Vel.x *= 0.9;

            // Player 1 Ability: Dino Energy (E key)
            if (keys['e'] && gameState.p1AbilityReady) {
                activateDinoEnergy();
            }

            // === Player 2 (Arrow Keys) ===
            const p2Vel = player2Body.velocity;

            if (keys['ArrowUp']) p2Vel.z = -moveSpeed;
            else if (keys['ArrowDown']) p2Vel.z = moveSpeed;
            else p2Vel.z *= 0.9;

            if (keys['ArrowLeft']) p2Vel.x = -moveSpeed;
            else if (keys['ArrowRight']) p2Vel.x = moveSpeed;
            else p2Vel.x *= 0.9;

            // Player 2 Ability: Boxy Dash (Space key)
            if (keys[' '] && gameState.p2AbilityReady) {
                activateBoxyDash();
            }
        }

        // Dino Energy Ability
        function activateDinoEnergy() {
            gameState.p1AbilityReady = false;
            gameState.p1LastAbility = Date.now();
            document.getElementById('p1-ability').classList.remove('ready');
            document.getElementById('p1-ability').textContent = '🦖 DINO: Charging...';

            // Create Dino Energy visual (large green transparent cylinder)
            const dinoGeometry = new THREE.CylinderGeometry(2, 2.5, 4, 8);
            const dinoMaterial = new THREE.MeshBasicMaterial({
                color: 0x00FF00,
                transparent: true,
                opacity: 0.6
            });
            dinoEnergyMesh = new THREE.Mesh(dinoGeometry, dinoMaterial);

            // Position in front of player 1
            const p1Pos = player1Body.position;
            dinoEnergyMesh.position.set(p1Pos.x + 3, p1Pos.y, p1Pos.z);
            dinoEnergyMesh.rotation.x = Math.PI / 2;
            scene.add(dinoEnergyMesh);

            // Check if boss is hit
            const distToBoss = Math.sqrt(
                Math.pow(bossMesh.position.x - dinoEnergyMesh.position.x, 2) +
                Math.pow(bossMesh.position.z - dinoEnergyMesh.position.z, 2)
            );

            if (distToBoss < 8) {
                damageBoss(CONFIG.DINO_ENERGY_DAMAGE);
                // Visual feedback
                dinoEnergyMesh.material.color.setHex(0xFFFF00);
            }

            // Remove after delay
            setTimeout(() => {
                if (dinoEnergyMesh) {
                    scene.remove(dinoEnergyMesh);
                    dinoEnergyMesh = null;
                }
            }, 500);

            // Cooldown
            setTimeout(() => {
                gameState.p1AbilityReady = true;
                document.getElementById('p1-ability').classList.add('ready');
                document.getElementById('p1-ability').textContent = '🦖 DINO: Ready!';
            }, CONFIG.DINO_COOLDOWN);
        }

        // Boxy Dash Ability
        function activateBoxyDash() {
            gameState.p2AbilityReady = false;
            gameState.p2LastAbility = Date.now();
            document.getElementById('p2-ability').classList.remove('ready');
            document.getElementById('p2-ability').textContent = '🥊 DASH: Recharging...';

            // Apply dash impulse (forward toward boss)
            const dashDirection = new CANNON.Vec3(1, 0, 0); // Forward on X axis
            player2Body.velocity.x = CONFIG.DASH_FORCE;

            // Visual effect - make gloves glow
            const leftGlove = player2Mesh.userData.leftGlove;
            const rightGlove = player2Mesh.userData.rightGlove;
            const originalColor = leftGlove.material.color.getHex();
            leftGlove.material.color.setHex(0xFFFF00);
            rightGlove.material.color.setHex(0xFFFF00);

            // Create dash trail
            const trailGeometry = new THREE.BoxGeometry(3, 1, 1);
            const trailMaterial = new THREE.MeshBasicMaterial({
                color: 0xFF0000,
                transparent: true,
                opacity: 0.5
            });
            const trail = new THREE.Mesh(trailGeometry, trailMaterial);
            trail.position.copy(player2Mesh.position);
            scene.add(trail);

            setTimeout(() => {
                scene.remove(trail);
                leftGlove.material.color.setHex(originalColor);
                rightGlove.material.color.setHex(originalColor);
            }, 300);

            // Check if boss is hit
            setTimeout(() => {
                const p2Pos = player2Body.position;
                const distToBoss = Math.sqrt(
                    Math.pow(bossMesh.position.x - p2Pos.x, 2) +
                    Math.pow(bossMesh.position.z - p2Pos.z, 2)
                );

                if (distToBoss < 6) {
                    damageBoss(CONFIG.BOXY_DASH_DAMAGE);
                }
            }, 200);

            // Cooldown
            setTimeout(() => {
                gameState.p2AbilityReady = true;
                document.getElementById('p2-ability').classList.add('ready');
                document.getElementById('p2-ability').textContent = '🥊 DASH: Ready!';
            }, CONFIG.DASH_COOLDOWN);
        }

        // Damage Boss
        function damageBoss(damage) {
            if (gameState.gameOver) return;

            gameState.bossHealth -= damage;
            gameState.bossHealth = Math.max(0, gameState.bossHealth);
            updateUI();

            // Boss flinch animation
            bossMesh.position.x += 0.5;
            setTimeout(() => {
                if (bossMesh) bossMesh.position.x -= 0.5;
            }, 100);

            // Check for victory
            if (gameState.bossHealth <= 0) {
                victory();
            }
        }

        // Boss AI
        function updateBossAI(delta) {
            if (gameState.gameOver) return;

            // Side-to-side movement
            bossMesh.position.z += bossDirection * delta * 2;
            bossBody.position.z = bossMesh.position.z;

            if (bossMesh.position.z > 4 || bossMesh.position.z < -4) {
                bossDirection *= -1;
            }

            // Arm animation (swaying)
            const time = Date.now() * 0.002;
            if (bossMesh.userData.leftArm) {
                bossMesh.userData.leftArm.rotation.x = Math.sin(time) * 0.2;
                bossMesh.userData.rightArm.rotation.x = Math.sin(time + Math.PI) * 0.2;
            }

            // Slam attack
            bossSlameTimer += delta;
            if (bossSlameTimer > 4 && !bossIsSlapping) { // Slam every 4 seconds
                performBossSlam();
                bossSlameTimer = 0;
            }

            // Check collision with players
            checkBossPlayerCollision();
        }

        // Boss Slam Attack
        function performBossSlam() {
            bossIsSlapping = true;

            // Raise arms
            const leftArm = bossMesh.userData.leftArm;
            const rightArm = bossMesh.userData.rightArm;
            const leftFist = bossMesh.userData.leftFist;
            const rightFist = bossMesh.userData.rightFist;

            // Wind up
            leftArm.position.y = CONFIG.BOSS_SIZE * 0.8;
            rightArm.position.y = CONFIG.BOSS_SIZE * 0.8;
            leftFist.position.y = CONFIG.BOSS_SIZE * 0.4;
            rightFist.position.y = CONFIG.BOSS_SIZE * 0.4;

            setTimeout(() => {
                // Slam down
                leftArm.position.y = CONFIG.BOSS_SIZE * -0.2;
                rightArm.position.y = CONFIG.BOSS_SIZE * -0.2;
                leftFist.position.y = CONFIG.BOSS_SIZE * -0.8;
                rightFist.position.y = CONFIG.BOSS_SIZE * -0.8;

                // Create shockwave visual
                const shockwaveGeometry = new THREE.RingGeometry(1, 15, 32);
                const shockwaveMaterial = new THREE.MeshBasicMaterial({
                    color: 0x8B4513,
                    transparent: true,
                    opacity: 0.5,
                    side: THREE.DoubleSide
                });
                const shockwave = new THREE.Mesh(shockwaveGeometry, shockwaveMaterial);
                shockwave.rotation.x = -Math.PI / 2;
                shockwave.position.set(bossMesh.position.x, CONFIG.BRIDGE_HEIGHT + 0.5, bossMesh.position.z);
                scene.add(shockwave);

                // Animate shockwave
                let scale = 1;
                const expandShockwave = setInterval(() => {
                    scale += 0.5;
                    shockwave.scale.setScalar(scale);
                    shockwave.material.opacity -= 0.05;
                    if (shockwave.material.opacity <= 0) {
                        clearInterval(expandShockwave);
                        scene.remove(shockwave);
                    }
                }, 50);

                // Apply impulse to players
                const slamForce = 15;
                const p1Dist = Math.abs(player1Body.position.x - bossMesh.position.x);
                const p2Dist = Math.abs(player2Body.position.x - bossMesh.position.x);

                if (p1Dist < 20) {
                    player1Body.velocity.y = slamForce;
                    player1Body.velocity.x = -slamForce * 0.5;
                    damagePlayer(1, CONFIG.BOSS_SLAM_DAMAGE);
                }

                if (p2Dist < 20) {
                    player2Body.velocity.y = slamForce;
                    player2Body.velocity.x = -slamForce * 0.5;
                    damagePlayer(2, CONFIG.BOSS_SLAM_DAMAGE);
                }

                // Reset arms
                setTimeout(() => {
                    leftArm.position.y = CONFIG.BOSS_SIZE * 0.2;
                    rightArm.position.y = CONFIG.BOSS_SIZE * 0.2;
                    leftFist.position.y = CONFIG.BOSS_SIZE * -0.4;
                    rightFist.position.y = CONFIG.BOSS_SIZE * -0.4;
                    bossIsSlapping = false;
                }, 300);

            }, 500);
        }

        // Check boss-player collision
        function checkBossPlayerCollision() {
            const bossX = bossMesh.position.x;
            const bossZ = bossMesh.position.z;

            // Player 1
            const p1X = player1Body.position.x;
            const p1Z = player1Body.position.z;
            const dist1 = Math.sqrt(Math.pow(bossX - p1X, 2) + Math.pow(bossZ - p1Z, 2));

            if (dist1 < 5) {
                // Push player back
                player1Body.velocity.x = -10;
                damagePlayer(1, 5);
            }

            // Player 2
            const p2X = player2Body.position.x;
            const p2Z = player2Body.position.z;
            const dist2 = Math.sqrt(Math.pow(bossX - p2X, 2) + Math.pow(bossZ - p2Z, 2));

            if (dist2 < 5) {
                player2Body.velocity.x = -10;
                damagePlayer(2, 5);
            }
        }

        // Damage Player
        function damagePlayer(playerNum, damage) {
            if (gameState.gameOver) return;

            if (playerNum === 1) {
                gameState.player1Health -= damage;
                gameState.player1Health = Math.max(0, gameState.player1Health);
            } else {
                gameState.player2Health -= damage;
                gameState.player2Health = Math.max(0, gameState.player2Health);
            }

            updateUI();

            // Check for defeat
            if (gameState.player1Health <= 0 && gameState.player2Health <= 0) {
                defeat();
            }
        }

        // Check for falling off bridge
        function checkRespawn() {
            // Player 1
            if (player1Body.position.y < CONFIG.RESPAWN_HEIGHT) {
                player1Body.position.set(-30, 10, 0);
                player1Body.velocity.set(0, 0, 0);
                damagePlayer(1, 20);
            }

            // Player 2
            if (player2Body.position.y < CONFIG.RESPAWN_HEIGHT) {
                player2Body.position.set(-25, 10, 2);
                player2Body.velocity.set(0, 0, 0);
                damagePlayer(2, 20);
            }

            // Keep players on bridge width
            player1Body.position.z = Math.max(-5, Math.min(5, player1Body.position.z));
            player2Body.position.z = Math.max(-5, Math.min(5, player2Body.position.z));

            // Keep players from going too far back
            player1Body.position.x = Math.max(-45, player1Body.position.x);
            player2Body.position.x = Math.max(-45, player2Body.position.x);
        }

        // Sync physics to graphics
        function syncPhysicsToGraphics() {
            // Player 1
            player1Mesh.position.copy(player1Body.position);
            player1Mesh.position.y -= CONFIG.PLAYER_SIZE * 0.3; // Adjust for visual offset

            // Player 2
            player2Mesh.position.copy(player2Body.position);
            player2Mesh.position.y -= CONFIG.PLAYER_SIZE * 0.25;

            // Face toward boss (positive X)
            player1Mesh.rotation.y = 0;
            player2Mesh.rotation.y = 0;
        }

        // Update Camera
        function updateCamera() {
            // Calculate midpoint between players
            const midX = (player1Body.position.x + player2Body.position.x) / 2;
            const midY = (player1Body.position.y + player2Body.position.y) / 2;
            const midZ = (player1Body.position.z + player2Body.position.z) / 2;

            // Calculate distance between players
            const playerDist = Math.sqrt(
                Math.pow(player1Body.position.x - player2Body.position.x, 2) +
                Math.pow(player1Body.position.z - player2Body.position.z, 2)
            );

            // Adjust camera distance based on player separation
            const baseDist = 25;
            const extraDist = Math.max(0, playerDist - 10) * 0.5;
            const cameraDist = baseDist + extraDist;

            // Smooth camera follow
            const targetX = midX - 5;
            const targetY = midY + 15;
            const targetZ = midZ + cameraDist;

            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.position.z += (targetZ - camera.position.z) * 0.05;

            camera.lookAt(midX, midY + 2, midZ);
        }

        // Update UI
        function updateUI() {
            const p1HealthPercent = (gameState.player1Health / CONFIG.PLAYER_HEALTH) * 100;
            const p2HealthPercent = (gameState.player2Health / CONFIG.PLAYER_HEALTH) * 100;
            const bossHealthPercent = (gameState.bossHealth / CONFIG.BOSS_HEALTH) * 100;

            document.getElementById('player1-health').style.width = p1HealthPercent + '%';
            document.getElementById('player2-health').style.width = p2HealthPercent + '%';
            document.getElementById('boss-health').style.width = bossHealthPercent + '%';
        }

        // Victory
        function victory() {
            gameState.gameOver = true;
            gameState.victory = true;

            // Animate boss falling
            bossBody.mass = 100;
            bossBody.updateMassProperties();
            bossBody.velocity.set(-5, 10, 0);
            bossBody.angularVelocity.set(0, 0, 2);

            // Show victory message
            setTimeout(() => {
                document.getElementById('message-text').textContent = '🎉 VICTORY! 🎉\nHerosauro & Super Boxy saved Porto!';
                document.getElementById('game-message').classList.add('victory');
            }, 1500);
        }

        // Defeat
        function defeat() {
            gameState.gameOver = true;

            document.getElementById('message-text').textContent = '💔 DEFEAT 💔\nAdamastor wins this round...';
            document.getElementById('game-message').classList.add('defeat');
        }

        // Restart Game
        function restartGame() {
            // Reset game state
            gameState = {
                player1Health: CONFIG.PLAYER_HEALTH,
                player2Health: CONFIG.PLAYER_HEALTH,
                bossHealth: CONFIG.BOSS_HEALTH,
                gameOver: false,
                victory: false,
                p1AbilityReady: true,
                p2AbilityReady: true,
                p1LastAbility: 0,
                p2LastAbility: 0
            };

            // Reset positions
            player1Body.position.set(-30, 5, 0);
            player1Body.velocity.set(0, 0, 0);
            player2Body.position.set(-25, 5, 2);
            player2Body.velocity.set(0, 0, 0);

            // Reset boss
            bossMesh.position.set(35, CONFIG.BOSS_SIZE * 1.5 + CONFIG.BRIDGE_HEIGHT, 0);
            bossMesh.rotation.set(0, 0, 0);
            bossBody.position.set(35, CONFIG.BOSS_SIZE * 1.5 + CONFIG.BRIDGE_HEIGHT, 0);
            bossBody.velocity.set(0, 0, 0);
            bossBody.angularVelocity.set(0, 0, 0);
            bossBody.mass = 0;
            bossBody.updateMassProperties();

            bossSlameTimer = 0;
            bossIsSlapping = false;
            bossDirection = 1;

            // Update UI
            updateUI();
            document.getElementById('game-message').classList.remove('victory', 'defeat');
            document.getElementById('p1-ability').classList.add('ready');
            document.getElementById('p1-ability').textContent = '🦖 DINO: Ready!';
            document.getElementById('p2-ability').classList.add('ready');
            document.getElementById('p2-ability').textContent = '🥊 DASH: Ready!';
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Update physics
            world.step(1 / 60, delta, 3);

            // Handle input
            handlePlayerMovement(delta);

            // Check respawn
            checkRespawn();

            // Update boss AI
            updateBossAI(delta);

            // Sync physics to graphics
            syncPhysicsToGraphics();

            // Update boss mesh from physics (for defeat animation)
            if (gameState.gameOver && gameState.victory) {
                bossMesh.position.copy(bossBody.position);
                bossMesh.quaternion.copy(bossBody.quaternion);
            }

            // Update camera
            updateCamera();

            // Render
            renderer.render(scene, camera);
        }

        // Start the game
        init();
    </script>
</body>
</html>
